name: Daily News Digest

on:
  schedule:
    # GitHub Actions uses UTC. The script chooses the active schedule for
    # America/New_York so daylight-saving changes do not produce duplicates.
    - cron: "30 9 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "How many previous local calendar days to include; 0 means today only"
        required: false
        default: "0"

permissions:
  contents: read
  actions: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore sent-item cache
        uses: actions/cache@v5
        with:
          path: data/sent_items.json
          key: daily-news-digest-sent-items-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            daily-news-digest-sent-items-

      - name: Produce and send digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_PROVIDER: ${{ vars.MODEL_PROVIDER }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          ANTHROPIC_VERSION: ${{ vars.ANTHROPIC_VERSION }}
          MAX_CANDIDATES_FOR_MODEL: ${{ vars.MAX_CANDIDATES_FOR_MODEL }}
          MAX_EMAIL_CANDIDATES: ${{ vars.MAX_EMAIL_CANDIDATES }}
          DEFAULT_SECTION_CANDIDATE_CAP: ${{ vars.DEFAULT_SECTION_CANDIDATE_CAP }}
          MAX_FEED_ITEMS_PER_OUTLET: ${{ vars.MAX_FEED_ITEMS_PER_OUTLET }}
          INCLUDE_GOOGLE_NEWS_FALLBACKS: ${{ vars.INCLUDE_GOOGLE_NEWS_FALLBACKS }}
          MAX_OUTPUT_TOKENS: ${{ vars.MAX_OUTPUT_TOKENS }}
          OPENAI_MAX_OUTPUT_TOKENS: ${{ vars.OPENAI_MAX_OUTPUT_TOKENS }}
          ANTHROPIC_MAX_OUTPUT_TOKENS: ${{ vars.ANTHROPIC_MAX_OUTPUT_TOKENS }}
          MODEL_API_TIMEOUT_SECONDS: ${{ vars.MODEL_API_TIMEOUT_SECONDS }}
          MODEL_API_RETRIES: ${{ vars.MODEL_API_RETRIES }}
          MODEL_API_RETRY_DELAY_SECONDS: ${{ vars.MODEL_API_RETRY_DELAY_SECONDS }}
          DIGEST_CONFIG_JSON: ${{ secrets.DIGEST_CONFIG_JSON }}
          DIGEST_CONFIG_JSON_B64: ${{ secrets.DIGEST_CONFIG_JSON_B64 }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '0' }}
        run: |
          args="--send --allow-fallback --lookback-days ${LOOKBACK_DAYS}"
          python scripts/daily_news_digest.py $args
